# InteractiveTask manifest for the Modelica FMU diagram task.
#
# The learner assembles a hydronic heating loop from Modelica Buildings
# Library components on a canvas; the backend topology-checks the diagram
# against the scenario's expected graph, then runs the pre-compiled FMU.
# FMUs are platform-authored (trust_tier: platform);
# author uploads are not part of this task's contract.

schema_version: "purelms.interactive_task.v1"

slug: modelica_diagram
name: Modelica FMU Diagram
version: 0.2.8
description: |
  Build a hydronic heating loop (boiler -> pump -> radiator -> room) from
  Modelica Buildings Library components, connect them correctly, then adjust the
  boiler power, insulation, room setpoint, and outdoor temperature and run the
  pre-compiled FMU to see how the room temperature and heating energy respond.

backend:
  # Built via `just build modelica_diagram`; production pushes to a registry
  # and installs with the resolved @sha256 digest (install --image-uri).
  image: purelms-itask-modelica-diagram:dev
  credit_cost: 2
  trust_tier: platform
  execution_mode: sync
  # The current FMPy subprocess does not expose a trustworthy completion
  # fraction, so the LMS presents an honest indeterminate bar.
  progress_reporting: none
  default_timeout_seconds: 60

frontend:
  bundle: modelica_diagram.js
  mount_contract: purelms.interactive_mount.v1

parameters:
  - name: scenario
    type: enum
    label: Scenario
    default: hydronic_loop
    choices:
      - { value: hydronic_loop, label: "Hydronic loop" }
  - name: diagram_json
    type: string
    label: Diagram
    description: >-
      The learner's diagram graph (purelms.diagram.v1). Filled by the bundle;
      never rendered as a form field.
  - name: layout_json
    type: string
    label: Layout
    description: >-
      Neutral canvas layout (node positions + reroute waypoints). Filled by the
      bundle; never rendered as a form field. Ignored by the backend.
  - name: boiler_nominal_power_kw
    type: number
    label: Boiler nominal power (kW)
    default: 10
    min: 2
    max: 20
  - name: room_setpoint_c
    type: number
    label: Target room temperature (C)
    default: 21
    min: 16
    max: 26
  - name: heat_loss_w_per_k
    type: number
    label: Heat loss (W/K)
    description: Building heat-loss coefficient; lower = better insulated.
    default: 150
    min: 50
    max: 400
  - name: outdoor_temp_c
    type: number
    label: Outdoor temperature (C)
    default: 0
    min: -15
    max: 15

outputs:
  - name: topology_correct
    type: boolean
    label: Diagram correct
  - name: room_temp_final_c
    type: number
    label: Final room temperature
    unit: degC
  - name: energy_used_kwh
    type: number
    label: Heat delivered
    unit: kWh
  - name: time_to_setpoint_min
    type: number
    label: Time to reach setpoint
    unit: min
  - name: series_json
    type: string
    label: Time series (JSON)

# Backend files baked into the container image, pinned by SHA-256.
# Paths are relative to this InteractiveTask root, backend/-prefixed.
assets:
  - path: backend/scenarios/hydronic_loop/scenario.json
    sha256: "86f7e3467c3713811f69f1eb398b12156905e68258d9cf16974dc11dabd392d7"
  - path: backend/scenarios/hydronic_loop/model.fmu
    sha256: "fd358022989b9420441637c986888026acfebf15d204790db337a0db5f4d5e79"

lms_context_used:
  - run_id
  - backend_slug
  - backend_version

requires_user_context: false

# A wrong diagram returns a SUCCESS envelope with topology_correct=false (the
# run worked; the answer was wrong). passthrough maps it to the pass outcome.
lms_outcomes:
  passed:
    source: outputs.topology_correct
    transform: passthrough
