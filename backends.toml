schema_version = 1

# Authoritative inventory of released backend container images. Aggregate Just
# recipes, the release workflow matrix, and LMS registration catalogs all read
# membership from this file so a backend is declared exactly once.

[[backend]]
slug = "echo"
dockerfile = "echo/backend/Dockerfile"
project_file = "echo/backend/pyproject.toml"
test_path = "echo/backend/tests"
metadata = "echo/backend/__metadata__.py"
manifest = "echo/interactive_task.yaml"
image_name = "purelms-itask-echo"
shared_contract_floor = "0.5.0"
platforms = ["linux/amd64"]
native_payload = "portable-python"
release = true

