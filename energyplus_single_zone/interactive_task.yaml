# EnergyPlus single-zone InteractiveTask — the first real domain backend.
#
# v0.2 runs a REAL EnergyPlus simulation. The backend builds a single-zone
# IDF from the learner's parameters (WindowMaterial:SimpleGlazingSystem
# takes the U-value directly; the window length is derived from the area),
# runs the bundled EnergyPlus binary against a per-zone TMY weather file,
# and mines eplusout.sql for the outputs.
#
# A pure-Python analytical steady-state model remains as the binary-free
# fallback (set PURELMS_EPLUS_MODE=analytical, or just run outside the
# container where the binary is absent) so contributors + CI + the local
# echo-demo can iterate without the ~500 MB EnergyPlus dependency. Both
# paths return identical output keys; the ``notes`` string says which ran.
#
# Bumped 0.1.0 → 0.2.0 (real EnergyPlus) → 0.2.1 (lms_outcomes grading
# rule) → 0.2.2 (frontend.reports_progress capability flag) → 0.2.3
# (authenticated callbacks and frontend hardening) → 0.2.4 (complete OIDC
# transport dependencies) → 0.2.5 (truthful startup and resumable frontend).
# Re-install with ``--replace-active`` to make 0.2.5
# the authoring default; existing blocks
# retain their exact pin until an author upgrades them.

schema_version: "purelms.interactive_task.v1"

slug: energyplus_single_zone
name: EnergyPlus Single-Zone
version: 0.2.5
description: |
  Single-zone building-energy InteractiveTask. The learner picks a
  glazing U-value, window area, and climate zone; the backend
  computes annual heating + cooling energy and peak heating load
  through the window.

  v0.2 runs a real EnergyPlus simulation (single-zone IDF generated
  from the parameters, run against a bundled TMY weather file per
  climate zone). A pure-Python analytical model is the binary-free
  fallback for dev/CI, capturing the dominant effects (lower U → less
  heat loss, colder climate → more heating) so the experience is
  meaningful even without the EnergyPlus binary.

backend:
  # Image name derives from slug by ``s/_/-/g`` →
  # ``purelms-itask-energyplus-single-zone:0.2.0``.
  # Local builds via ``just build energyplus_single_zone`` tag with
  # ``:dev``; production deploys push to a registry with the
  # version tag.
  image: purelms-itask-energyplus-single-zone:dev
  credit_cost: 1
  trust_tier: platform
  execution_mode: sync
  default_timeout_seconds: 30

frontend:
  # Built via ``just frontend-build energyplus_single_zone`` to
  # ``frontend/dist/energyplus_single_zone.js`` — a vanilla
  # TypeScript + Three.js bundle that mounts this filename.
  bundle: energyplus_single_zone.js
  # Declares that this backend emits intermediate progress (the
  # runner reports phase progress via the worker's progress
  # callback). The LMS surfaces this to the dispatcher, which picks
  # a determinate progress bar over an indeterminate one. Only
  # observable on async deployments: a synchronous run blocks the
  # submit request until done, so the browser still sees an
  # indeterminate bar locally regardless of this flag.
  reports_progress: true

# Layer 1 parameter schema. Course authors tighten or hide
# individual parameters at Layer 2 on the InteractiveTaskBlock.
parameters:
  - name: glazing_u_value
    type: number
    label: Glazing U-value
    description: |
      Heat transfer coefficient of the window assembly. Lower is
      better-insulating. Typical residential values: 0.7-1.4
      (triple-pane low-e), 1.6-2.5 (double-pane), 5-6 (single-pane).
    unit: "W/m²K"
    min: 0.5
    max: 6.0
    step: 0.1
    default: 2.5
    required: true

  - name: window_area
    type: number
    label: Window area
    description: |
      Total glazing area in the zone. Larger windows mean more
      daylight + view but more heat loss.
    unit: "m²"
    min: 1.0
    max: 20.0
    step: 0.5
    default: 5.0
    required: true

  - name: climate_zone
    type: enum
    label: Climate zone
    description: |
      ASHRAE climate zone (humid subset). Drives heating + cooling
      degree-day totals + design heating temperature differential.
    choices:
      - {value: "4A", label: "4A Mixed-humid (e.g. New York City)"}
      - {value: "5A", label: "5A Cool-humid (e.g. Chicago)"}
      - {value: "6A", label: "6A Cold-humid (e.g. Minneapolis)"}
    default: "5A"
    required: true

# Layer 1 output schema. The container's ``output.json``
# MUST carry keys matching these names exactly — the LMS uses the
# manifest to look up labels / units / display hints when rendering
# results to the learner.
outputs:
  - name: annual_heating_kWh
    type: number
    label: Annual heating energy
    description: |
      Total heat loss through the window over the heating season.
      Computed from U × A × heating-degree-days × 24h/day.
    unit: kWh
    display_hint: value-card

  - name: annual_cooling_kWh
    type: number
    label: Annual cooling energy
    description: |
      Total heat gain through the window during the cooling season.
      Smaller term in cold climates; significant in warm-humid.
    unit: kWh
    display_hint: value-card

  - name: peak_heating_kW
    type: number
    label: Peak heating load
    description: |
      Heat loss rate through the window at the climate zone's
      design-day temperature differential.
    unit: kW
    display_hint: value-card

  - name: notes
    type: string
    label: Notes
    description: Human-readable summary of the simulation result.
    display_hint: alert

# Standard envelope context fields this backend reads. The backend
# uses ``run_id`` for log correlation; the full identification
# triple is declared so a version that logs "who ran what when"
# already has the declaration in place.
lms_context_used:
  - run_id
  - backend_slug
  - backend_version

requires_user_context: false

# lms_outcomes — LMS-side outcome evaluation
# reads these rules from the persisted manifest at completion and maps the
# backend's outputs onto the grade book's (passed, score) fields.
#
# Pedagogy: "design a window with annual heating below 2,800 kWh." For the
# default 5A / 5 m² scenario the baseline U=2.5 glazing yields ~3,047 kWh
# (FAILS); improving to roughly U<=1.7 brings it under target (PASSES). So
# running the defaults and seeing FAILED motivates the learner to pick a
# better-insulating window — the whole point of the exercise. ``score``
# gives graded partial credit (lower heating → higher score) regardless.
#
# The threshold is the InteractiveTask author's sensible default; a course
# author teaching a different climate/window size can override it per block
# via the block's interaction_details.lms_outcomes (e.g.
# {"passed": {"threshold": 4000}} for a 6A course) — only the threshold-
# style args; source/transform stay locked here. (L2 override shipped
# 2026-05-29.)
lms_outcomes:
  passed:
    source: outputs.annual_heating_kWh
    transform: less_than
    threshold: 2800
  score:
    source: outputs.annual_heating_kWh
    transform: normalize_inverse
    bounds: [2000, 5000]
